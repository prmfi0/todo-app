<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="index-todo-app">

    <div class="header">
        <h1 class="logo">ToDo</h1>

        <button id="theme-toggle" class="theme-toggle">
            <span></span>
            <div class="toggle-circle"></div>
        </button>
    </div>

    <div class="input-text">
        <p class="test-top-input">add new task</p>

        <div class="input">
            <input type="text" class="input-task" placeholder="what do you want to do ?">
            <button class="send-task">send</button>
        </div>
    </div>
    <div id="tasks" style="margin-top: 100px;"></div>
</div>
<script src="app.js"></script>
</body>
</html>
